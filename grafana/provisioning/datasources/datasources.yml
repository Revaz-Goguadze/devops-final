apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      # Surfaces the Prometheus-managed alert rules under Grafana's Alerting tab.
      manageAlerts: true

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
