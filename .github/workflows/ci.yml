name: CI/CD

# Runs on every push and PR to main/develop, plus manual dispatch.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- lint + test
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r app/requirements.txt -r app/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app
      - name: Unit tests (pytest)
        run: cd app && pytest -q

  # ------------------------------------------------------------------- security
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan commits

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: Gitleaks (secret scanning)
        # Pinned to the same image/version as scripts/security-scan.sh for parity.
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.21.2 detect \
            --source /repo --no-banner --redact

      - name: Trivy filesystem (deps + IaC misconfig + secrets)
        run: |
          docker run --rm -v "$PWD:/src" aquasec/trivy:0.65.0 fs \
            --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress /src

      - name: pip-audit (Python dependency CVEs — runtime + dev)
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r app/requirements.txt -r app/requirements-dev.txt

  # ----------------------------------------------- build + image scan + verify
  build-verify:
    name: Build, scan image & verify deployment
    runs-on: ubuntu-latest
    needs: [lint-test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build stack
        run: docker compose build

      - name: Trivy image scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress final-app:latest

      - name: Start stack
        run: docker compose up -d

      - name: Verify deployment (post-deploy health checks)
        run: ./scripts/verify.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # --------------------------------------------- continuous deployment (main)
  # Automated deployment to a running environment, gated on merges to main.
  # Fully local — no paid cloud, no external secrets. It exercises the real
  # deployment automation (scripts/deploy.sh: build -> release -> verify ->
  # AUTO-ROLLBACK on failure) and then runs post-deploy checks against the live
  # stack, including the end-to-end alert notification path.
  deploy:
    name: Deploy (main) — release, verify & auto-rollback
    runs-on: ubuntu-latest
    needs: [build-verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the target environment
        run: docker compose up -d

      - name: Deploy new app release (verify + auto-rollback)
        run: ./scripts/deploy.sh

      - name: Post-deploy notification-path check (alert -> email -> Mailpit)
        run: ./scripts/check-notification.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
