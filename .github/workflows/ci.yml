name: CI/CD

# Runs on every push and PR to main, plus manual dispatch.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- lint + test
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r app/requirements.txt -r app/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check app
      - name: Unit tests (pytest)
        run: cd app && pytest -q

  # ------------------------------------------------------------------- security
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so gitleaks can scan commits

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error

      - name: Gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem (deps + IaC misconfig + secrets)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: pip-audit (Python dependency CVEs)
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt

  # ----------------------------------------------- build + image scan + verify
  build-verify:
    name: Build, scan image & verify deployment
    runs-on: ubuntu-latest
    needs: [lint-test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build stack
        run: docker compose build

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: image
          image-ref: final-app:latest
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Start stack
        run: docker compose up -d

      - name: Verify deployment (post-deploy health checks)
        run: ./scripts/verify.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
